<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPRCAS Book My HALL – Dashboard</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/static/css/dashboard.css">
</head>

<body class="role-${session.role}">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon-wrap">
        <img src="https://image2url.com/r2/default/images/1774243478274-c1b09675-5ce9-40cd-a741-5d1a37595866.jpeg" alt="Logo">
      </div>
      <div class="brand-stack">
        <span class="brand-kprcas">KPRCAS</span>
        <span class="brand-hms hms-premium">Book My HALL</span>
      </div>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <div class="user-info" id="userInfo"></div>
      <button class="logout-btn" onclick="logout()">
        <span class="logout-icon">🚪</span>
        <span>Sign Out</span>
      </button>
    </div>
  </aside>

  <div class="main-wrap">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggleBtn" onclick="toggleSidebar()" aria-label="Toggle menu">☰</button>
      
      <div class="topbar-center">
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
      </div>

      <div class="topbar-right-group">
        <div class="topbar-date" id="topbarDate"></div>
        <div class="lock-badge" id="lockBadge" style="display:none">🔒 Locked</div>
      </div>
    </header>

    <div class="portal-locked-screen" id="portalLockedScreen" style="display:none">
      <div class="locked-content">
        <div class="locked-icon">🔒</div>
        <h2>Portal Locked</h2>
        <p>The administrator has temporarily locked the portal. Please check back later or contact the admin.</p>
      </div>
    </div>

    <main class="page-content" id="pageContent"></main>
  </div>

  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal" id="mainModal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- Sidebar overlay for mobile tap-to-close -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

  <script src="/static/js/roles/admin.js"></script>
  <script src="/static/js/roles/booker.js"></script>
  <script src="/static/js/roles/principal.js"></script>
  <script src="/static/js/roles/departments.js"></script>
  <script src="/static/js/roles/clubs.js"></script>
  <script src="/static/js/reports.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>

</html>

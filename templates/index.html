<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPRCAS HMS – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #0ea5e9;
      --bg: #0f172a;
      --surface: rgba(255, 255, 255, 0.03);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --radius: 20px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin: 0;
    }

    /* Professional Mesh Gradient Background */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: 
        radial-gradient(circle at 0% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 100% 100%, rgba(14, 165, 233, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(79, 70, 229, 0.05) 0%, transparent 50%);
    }

    .blob {
      position: absolute;
      width: 600px;
      height: 600px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      filter: blur(120px);
      border-radius: 50%;
      opacity: 0.15;
      animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
    }

    .blob-1 { top: -20%; left: -10%; }
    .blob-2 { bottom: -20%; right: -10%; animation-delay: -5s; }

    @keyframes float {
      0% { transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { transform: translate(100px, 50px) rotate(90deg) scale(1.1); }
    }

    .login-card {
      width: 440px;
      padding: 48px;
      background: rgba(15, 23, 42, 0.6);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5), inset 0 1px 1px var(--border);
      position: relative;
      z-index: 1;
      animation: cardSlide 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    @keyframes cardSlide {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 20px;
      background: #ffffff;
      padding: 12px;
      border-radius: 18px;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.2);
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .title {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      background: linear-gradient(to right, #fff, #94a3b8);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      margin-left: 4px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: #fff;
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .input-wrapper input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.3);
      margin-top: 12px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.4);
      filter: brightness(1.1);
    }

    .error-msg {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 12px;
      color: #f87171;
      font-size: 0.875rem;
      font-weight: 500;
      display: none;
      text-align: center;
    }

    /* Demo Credentials Section */
    .demo-section {
      margin-top: 40px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }

    .demo-title {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 16px;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .demo-btn {
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .demo-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      color: #fff;
    }

    .demo-btn.full {
      grid-column: span 2;
    }
  </style>
</head>

<body>
  <div class="mesh-bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="login-card">
    <div class="brand-section">
      <div class="brand-logo">
        <img src="https://image2url.com/r2/default/images/1774243478274-c1b09675-5ce9-40cd-a741-5d1a37595866.jpeg" alt="KPRCAS Logo">
      </div>
      <h1 class="title">KPRCAS HMS</h1>
      <p class="subtitle">Event Management System</p>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>

    <button class="btn-submit" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="errMsg"></div>

    <div class="demo-section">
      <div class="demo-title">Quick Access</div>
      <div class="demo-grid">
        <button class="demo-btn" onclick="qL('admin','admin123')">Admin</button>
        <button class="demo-btn" onclick="qL('booker','booker123')">Booker</button>
        <button class="demo-btn" onclick="qL('it','it123')">IT Dept</button>
        <button class="demo-btn" onclick="qL('reception','reception123')">Reception</button>
        <button class="demo-btn full" onclick="qL('principal','principal123')">Principal Desk</button>
      </div>
    </div>
  </div>

  <script>
    function qL(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
      doLogin();
    }
    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('errMsg');
      if (!u || !p) {
        err.style.display = 'block';
        err.textContent = 'Enter username & password';
        return;
      }
      err.style.display = 'none';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username: u, password: p })
        });
        const d = await res.json();
        if (!res.ok) {
          err.style.display = 'block';
          err.textContent = d.error || 'Login failed';
          return;
        }
        window.location.href = '/dashboard';
      } catch (e) {
        err.style.display = 'block';
        err.textContent = 'Server connection error';
      }
    }
  </script>
</body>

</html>

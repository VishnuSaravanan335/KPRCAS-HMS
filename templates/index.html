<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPRCAS Book My HALL | Institutional Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --accent: #10b981;
      --bg: #0f172a;
      --surface: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.1);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --radius: 20px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #0f172a;
      background-image: 
        radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
        url('https://image2url.com/r2/default/images/1774693300562-ec230e1e-7f9c-4a56-ad58-919234579dae.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      position: relative;
    }

    /* Glass Effect Card Upgrade */
    .login-card {
      background: rgba(15, 23, 42, 0.4); /* Transparent dark base */
      backdrop-filter: blur(40px) saturate(200%); /* Modern blur */
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1.5px solid rgba(255, 255, 255, 0.1); /* Subtle border */
      border-radius: var(--radius);
      padding: 48px;
      box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.7);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-wrapper {
      width: 72px;
      height: 72px;
      background: #ffffff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      padding: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.1);
    }

    .logo-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .title {
      font-size: 1.85rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 6px;
      background: linear-gradient(to right, #fff, #94a3b8);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .form-field {
      margin-bottom: 24px;
    }

    .form-field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 14px 18px;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.25s ease;
    }

    .input-wrapper input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.25);
      margin-top: 8px;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(79, 70, 229, 0.35);
      filter: brightness(1.1);
    }

    .btn-login:active { transform: translateY(0); }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      margin-top: 20px;
      padding: 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 10px;
      color: #f87171;
      font-size: 0.85rem;
      font-weight: 600;
      text-align: center;
      display: none;
    }

    .demo-section {
      margin-top: 36px;
      padding-top: 28px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .demo-title {
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: center;
      margin-bottom: 16px;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .demo-btn {
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 10px;
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .demo-btn:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--primary);
      color: #fff;
    }

    .demo-btn.full { grid-column: span 2; }

    /* Footer Branding */
    .footer {
      margin-top: 32px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 0.02em;
    }

    @media (max-width: 440px) {
      .login-card { padding: 32px 24px; }
      .footer { display: none; }
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <div class="header">
        <div class="logo-wrapper">
          <img src="https://image2url.com/r2/default/images/1774243478274-c1b09675-5ce9-40cd-a741-5d1a37595866.jpeg" alt="Logo">
        </div>
        <h1 class="title">KPRCAS Book My HALL</h1>
        <p class="subtitle">Institutional Booking Portal</p>
      </div>

      <div class="form-field">
        <label>Username</label>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>
      </div>

      <div class="form-field">
        <label>Password</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')doLogin()">
        </div>
      </div>

      <button class="btn-login" onclick="doLogin()">Authorize & Continue</button>
      <div class="error-box" id="errMsg"></div>

      <div class="demo-section">
        <h3 class="demo-title">Administrative Role Access</h3>
        <div class="demo-grid">
          <button class="demo-btn" onclick="qL('admin','admin123')">System Admin</button>
          <button class="demo-btn" onclick="qL('booker','booker123')">Faculty / Staff</button>
          <button class="demo-btn" onclick="qL('it','it123')">IT Support</button>
          <button class="demo-btn" onclick="qL('reception','reception123')">Reception</button>
          <button class="demo-btn" onclick="qL('pixesclub','pixes123')">Pixes Club</button>
          <button class="demo-btn" onclick="qL('fineartsclub','finearts123')">Dance Performance</button>
          <button class="demo-btn full" onclick="qL('principal','principal123')">Principal Approval Desk</button>
        </div>
      </div>
    </div>
    
    <div class="footer">
      KPR INSTITUTIONS — Book My HALL · V2.6.0
    </div>
  </div>

  <script>
    function qL(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
      doLogin();
    }

    async function doLogin() {
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('errMsg');
      const btn = document.querySelector('.btn-login');
      
      if (!u || !p) {
        err.style.display = 'block';
        err.textContent = 'Please enter valid credentials';
        return;
      }
      
      err.style.display = 'none';
      const originalText = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span> Authenticating...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username: u, password: p })
        });
        const d = await res.json();
        if (!res.ok) {
          err.style.display = 'block';
          err.textContent = d.error || 'Authentication denied';
          btn.innerHTML = originalText;
          btn.disabled = false;
          return;
        }
        window.location.href = '/dashboard';
      } catch (e) {
        err.style.display = 'block';
        err.textContent = 'Service unavailable. Check connection.';
        btn.innerHTML = originalText;
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
